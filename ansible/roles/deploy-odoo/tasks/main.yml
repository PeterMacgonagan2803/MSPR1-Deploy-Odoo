---
- name: Configurer le kubeconfig
  ansible.builtin.set_fact:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

- name: Ajouter le repo Helm nfs-subdir-external-provisioner
  kubernetes.core.helm_repository:
    name: nfs-subdir-external-provisioner
    repo_url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
    kubeconfig: "{{ kubeconfig_path }}"

- name: Ajouter le repo Helm Jetstack (cert-manager)
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    kubeconfig: "{{ kubeconfig_path }}"
  when: enable_cert_manager | default(false)

# --- NFS Provisioner ---

- name: Créer le namespace storage
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: storage

- name: Déployer nfs-subdir-external-provisioner via Helm
  kubernetes.core.helm:
    name: nfs-provisioner
    chart_ref: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    release_namespace: storage
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    values: "{{ lookup('template', 'nfs-values.yml.j2') | from_yaml }}"
    wait: true
    timeout: "5m0s"

# --- cert-manager (optionnel, desactive si quay.io indisponible) ---

- name: Déployer cert-manager via Helm
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    release_namespace: cert-manager
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    values:
      installCRDs: true
    wait: true
    timeout: "10m0s"
  when: enable_cert_manager | default(false)

- name: Attendre que cert-manager soit prêt
  ansible.builtin.pause:
    seconds: 15
  when: enable_cert_manager | default(false)

- name: Créer le ClusterIssuer autosigné
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: "{{ lookup('template', 'cert-manager-issuer.yml.j2') | from_yaml }}"
  when: enable_cert_manager | default(false)

# --- PostgreSQL (image officielle) ---

- name: Créer le namespace odoo
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: odoo

- name: Déployer PostgreSQL
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: "{{ item }}"
  loop: "{{ lookup('template', 'odoo-postgres.yml.j2') | from_yaml_all | list }}"
  when: item is not none

- name: Attendre que PostgreSQL soit prêt
  ansible.builtin.shell: |
    kubectl wait --for=condition=available deployment/postgres -n odoo --timeout=120s
  changed_when: false
  retries: 3
  delay: 10

# --- Odoo (image officielle) ---

- name: Déployer Odoo
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: "{{ item }}"
  loop: "{{ lookup('template', 'odoo-app.yml.j2') | from_yaml_all | list }}"
  when: item is not none

- name: Attendre que Odoo soit prêt
  ansible.builtin.shell: |
    kubectl wait --for=condition=available deployment/odoo -n odoo --timeout=300s
  changed_when: false
  retries: 3
  delay: 15

- name: Créer l'Ingress pour Odoo
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: "{{ lookup('template', 'odoo-ingress.yml.j2') | from_yaml }}"

- name: Vérifier le déploiement Odoo
  ansible.builtin.shell: |
    kubectl get pods -n odoo -o wide
    echo "---"
    kubectl get svc -n odoo
    echo "---"
    kubectl get ingress -n odoo
  register: odoo_status
  changed_when: false

- name: Afficher l'état du déploiement Odoo
  ansible.builtin.debug:
    msg: "{{ odoo_status.stdout_lines }}"

- name: Récupérer l'IP du service Odoo dans le cluster
  ansible.builtin.shell: |
    kubectl get svc -n odoo odoo -o jsonpath='{.spec.clusterIP}'
  register: odoo_svc_ip
  changed_when: false

- name: Health check - Vérifier qu'Odoo répond en HTTP
  ansible.builtin.uri:
    url: "http://{{ odoo_svc_ip.stdout }}:8069/web/database/selector"
    method: GET
    status_code: [200, 303, 500]
    timeout: 30
  register: odoo_health
  retries: 5
  delay: 10
  until: odoo_health.status is defined
  ignore_errors: true

- name: Health check réussi
  ansible.builtin.debug:
    msg: "Odoo repond (HTTP {{ odoo_health.status | default('N/A') }}) sur {{ odoo_svc_ip.stdout }}:8069 - init DB sera faite apres"
